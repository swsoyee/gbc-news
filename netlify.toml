[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/feed"
  to = "/.netlify/functions/feed"
  status = 200

# 首页迁移至推活日历；RSS/iCal、静态数据与 API 仍保留在本域
[[redirects]]
  from = "/"
  to = "https://oshi-news.netlify.app/"
  status = 302
  force = true

[[redirects]]
  from = "/index.html"
  to = "https://oshi-news.netlify.app/"
  status = 302
  force = true

[[headers]]
  for = "/feeds/*"
  [headers.values]
    # 日历客户端常强缓存；短 TTL + 强制再验证，部署后尽快拿到新 ICS
    Cache-Control = "public, max-age=0, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Access-Control-Allow-Origin = "*"
