<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gbc-news</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg0: #101418;
        --bg1: #1a2229;
        --ink: #f4efe6;
        --muted: #b7c0c8;
        --accent: #e85d4c;
        --line: rgba(244, 239, 230, 0.16);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'IBM Plex Sans JP', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 18%, rgba(232, 93, 76, 0.28), transparent 42%),
          radial-gradient(circle at 88% 0%, rgba(90, 140, 180, 0.22), transparent 36%),
          linear-gradient(160deg, var(--bg0), var(--bg1) 55%, #12171d);
      }
      main {
        width: min(900px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 12vh 0 4rem;
      }
      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(2.8rem, 10vw, 4.8rem);
        line-height: 1.15;
        letter-spacing: -0.03em;
        margin: 0 0 1.25rem;
      }
      .lead {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
        margin: 0 0 2rem;
        max-width: 36rem;
      }
      section {
        border-top: 1px solid var(--line);
        padding-top: 1.4rem;
        margin-top: 1.4rem;
      }
      h2 {
        font-size: 0.85rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin: 0 0 1rem;
        color: var(--muted);
      }
      .cats {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }
      label.cat {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        border: 1px solid var(--line);
        padding: 0.55rem 0.8rem;
        cursor: pointer;
        user-select: none;
        background: rgba(255, 255, 255, 0.03);
      }
      label.cat:has(input:checked) {
        border-color: var(--accent);
        background: rgba(232, 93, 76, 0.14);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin: 0.8rem 0 0;
      }
      button,
      a.btn {
        appearance: none;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--ink);
        font: inherit;
        padding: 0.55rem 0.9rem;
        cursor: pointer;
        text-decoration: none;
        transition:
          background 140ms ease-out,
          border-color 140ms ease-out,
          color 140ms ease-out;
      }
      button:hover,
      a.btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(244, 239, 230, 0.36);
      }
      button.primary,
      a.btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #1a0f0d;
        font-weight: 700;
      }
      button.primary:hover,
      a.btn.primary:hover {
        background: #ff8a7a;
        border-color: #ff8a7a;
      }
      .links {
        display: grid;
        gap: 0.8rem;
      }
      .link-row {
        display: grid;
        gap: 0.35rem;
      }
      .link-code {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: stretch;
        gap: 0.45rem;
      }
      .link-field {
        position: relative;
        min-width: 0;
      }
      .link-field code {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        height: 2.85rem;
        line-height: calc(2.85rem - 2px);
        padding: 0 3rem 0 0.85rem;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid var(--line);
        font-size: 0.86rem;
      }
      .link-actions {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0.35rem;
      }
      button.btn-icon,
      a.btn-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.4rem;
        height: 2.4rem;
        padding: 0;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--ink);
        font: inherit;
        cursor: pointer;
        text-decoration: none;
        transition:
          background 140ms ease-out,
          border-color 140ms ease-out,
          color 140ms ease-out,
          opacity 140ms ease-out;
      }
      button.btn-icon:hover,
      a.btn-icon:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(244, 239, 230, 0.36);
      }
      button.btn-icon:focus-visible,
      a.btn-icon:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      button.btn-icon.primary,
      a.btn-icon.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #1a0f0d;
      }
      button.btn-icon.primary:hover,
      a.btn-icon.primary:hover {
        background: #ff8a7a;
        border-color: #ff8a7a;
      }
      button.btn-icon svg,
      a.btn-icon svg {
        width: 1.05rem;
        height: 1.05rem;
        display: block;
        pointer-events: none;
      }
      button.btn-icon.copy-inline {
        position: absolute;
        top: 50%;
        right: 0.35rem;
        transform: translateY(-50%);
        z-index: 1;
        background: transparent;
        border-color: transparent;
        color: var(--accent);
      }
      button.btn-icon.copy-inline:hover {
        background: rgba(232, 93, 76, 0.14);
        border-color: transparent;
        color: #ff8a7a;
      }
      button.copy-inline[data-tooltip]::after {
        content: attr(data-tooltip);
        position: absolute;
        left: 50%;
        bottom: calc(100% + 0.35rem);
        transform: translateX(-50%) translateY(0.15rem);
        padding: 0.28rem 0.5rem;
        border: 1px solid var(--line);
        background: rgba(16, 20, 24, 0.96);
        color: var(--ink);
        font-size: 0.72rem;
        line-height: 1.2;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }
      button.copy-inline.is-copied[data-tooltip]::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .link-row.is-dimmed {
        opacity: 0.45;
      }
      .link-row.is-dimmed strong {
        color: var(--muted);
      }
      #filter-status {
        margin: 0.9rem 0 0;
        padding: 0.75rem 0.85rem;
        border: 1px solid var(--accent);
        background: rgba(232, 93, 76, 0.12);
        color: var(--ink);
        font-size: 0.92rem;
        line-height: 1.55;
      }
      .calendar-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
        margin-bottom: 0.9rem;
      }
      .calendar-title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.55rem;
      }
      .calendar-head h2 {
        margin-bottom: 0;
      }
      .calendar-views {
        display: flex;
        gap: 0.3rem;
      }
      .calendar-views button {
        padding: 0.28rem 0.55rem;
        font-size: 0.78rem;
      }
      .calendar-views button.is-active {
        background: var(--accent);
        border-color: var(--accent);
        color: #1a0f0d;
        font-weight: 700;
      }
      .calendar-views button.is-active:hover {
        background: #ff8a7a;
        border-color: #ff8a7a;
      }
      .section-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-start;
        gap: 0.55rem;
        margin-bottom: 1rem;
      }
      .section-head h2 {
        margin-bottom: 0;
      }
      .section-head button {
        padding: 0.28rem 0.55rem;
        font-size: 0.78rem;
      }
      .section-head button.is-active {
        background: var(--accent);
        border-color: var(--accent);
        color: #1a0f0d;
        font-weight: 700;
      }
      .section-head button.is-active:hover {
        background: #ff8a7a;
        border-color: #ff8a7a;
      }
      .calendar-nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
      }
      .calendar-month-label {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        min-width: 7.5rem;
        text-align: center;
      }
      .calendar-note {
        color: var(--muted);
        font-size: 0.82rem;
        margin: 0 0 0.75rem;
      }
      .calendar-board {
        position: relative;
        overflow-x: auto;
        overflow-y: hidden;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.16);
      }
      .calendar-board.is-week-view,
      .calendar-board.is-day-view {
        overflow-x: auto;
        overflow-y: auto;
      }
      .calendar-board.is-day-view {
        overflow-x: hidden;
      }
      .calendar-board.is-day-view .calendar-weekdays {
        display: none;
      }
      .calendar-board.is-day-view .calendar-grid {
        min-width: 0;
      }
      .calendar-board.is-day-view .calendar-month-bg {
        font-size: clamp(8rem, 28vw, 14rem);
        overflow: hidden;
      }
      .calendar-board.is-week-view .calendar-grid {
        min-width: 48rem;
      }
      .calendar-board.is-week-view .calendar-weekdays {
        display: none;
      }
      .calendar-month-bg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(10rem, 36vw, 20rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.06em;
        color: rgba(244, 239, 230, 0.03);
        pointer-events: none;
        user-select: none;
        z-index: 0;
      }
      .calendar-weekdays,
      .calendar-week {
        display: grid;
        grid-template-columns: repeat(7, minmax(6.2rem, 1fr));
        min-width: 43.4rem;
      }
      .calendar-weekdays,
      .calendar-grid {
        position: relative;
        z-index: 1;
      }
      .calendar-grid {
        min-width: 43.4rem;
      }
      .calendar-week {
        height: 7.2rem;
        overflow: hidden;
        position: relative;
        transition: height 180ms ease-out;
      }
      .calendar-week.is-expanded {
        height: var(--calendar-expanded-height, 7.2rem);
      }
      .calendar-weekdays span {
        padding: 0.45rem 0.35rem;
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-align: center;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }
      .calendar-day-cell {
        min-height: 7.2rem;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 0.35rem;
        background: rgba(255, 255, 255, 0.02);
      }
      .calendar-day-cell:nth-child(7n) {
        border-right: none;
      }
      .calendar-day-cell.is-outside {
        opacity: 0.42;
        background: transparent;
      }
      .calendar-day-cell.is-today {
        background: rgba(232, 93, 76, 0.1);
        box-shadow: inset 0 0 0 2px rgba(232, 93, 76, 0.78);
      }
      .calendar-day-num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.55rem;
        height: 1.55rem;
        margin-bottom: 0.3rem;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
      }
      .calendar-day-cell.is-rest-day .calendar-day-num,
      .calendar-day-cell.is-holiday .calendar-day-num {
        color: var(--accent);
      }
      .calendar-day-cell.is-today .calendar-day-num {
        border-radius: 999px;
        background: var(--accent);
        color: #1a0f0d;
      }
      .calendar-day-events {
        display: grid;
        gap: 0.2rem;
      }
      a.calendar-chip {
        display: block;
        align-self: start;
        grid-row: 1;
        min-width: 0;
        margin: calc(2.15rem + var(--calendar-lane) * 1.25rem) 0.16rem 0;
        z-index: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 0.18rem 0.3rem;
        border-left: 2px solid var(--accent);
        background: rgba(232, 93, 76, 0.16);
        color: var(--ink);
        font-size: 0.68rem;
        line-height: 1.35;
        text-decoration: none;
      }
      a.calendar-chip.is-sale {
        border-left-color: #5a8cb4;
        background: rgba(90, 140, 180, 0.2);
      }
      a.calendar-chip.is-span {
        opacity: 0.88;
      }
      a.calendar-chip.is-overflow {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-0.2rem);
        transition:
          opacity 140ms ease-out,
          transform 180ms ease-out,
          visibility 0s linear 180ms;
        visibility: hidden;
      }
      .calendar-week.is-expanded a.calendar-chip.is-overflow {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
        transition-delay: 40ms;
        visibility: visible;
      }
      a.calendar-chip:hover {
        background: rgba(232, 93, 76, 0.28);
      }
      a.calendar-chip.is-sale:hover {
        background: rgba(90, 140, 180, 0.32);
      }
      .calendar-event-tooltip {
        position: fixed;
        z-index: 20;
        width: max-content;
        max-width: min(28rem, calc(100vw - 2rem));
        padding: 0.45rem 0.6rem;
        border: 1px solid var(--line);
        background: rgba(16, 20, 24, 0.96);
        color: var(--ink);
        font-size: 0.78rem;
        line-height: 1.45;
        overflow-wrap: anywhere;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, calc(-100% + 0.2rem));
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }
      .calendar-event-tooltip.is-visible {
        opacity: 1;
        transform: translate(-50%, -100%);
      }
      .calendar-event-tooltip.is-below {
        transform: translate(-50%, -0.2rem);
      }
      .calendar-event-tooltip.is-below.is-visible {
        transform: translate(-50%, 0);
      }
      .calendar-more {
        align-self: start;
        grid-row: 1;
        margin-top: calc(2.15rem + 3 * 1.25rem);
        z-index: 1;
        color: var(--muted);
        cursor: default;
        font-size: 0.68rem;
        padding: 0.1rem 0.2rem;
        transition:
          opacity 100ms ease-out,
          visibility 0s linear 100ms;
      }
      .calendar-week.is-expanded .calendar-more {
        opacity: 0;
        visibility: hidden;
      }
      .calendar-day-agenda {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 0.45rem;
        padding: 0.85rem;
      }
      .calendar-time-grid {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 0;
      }
      .calendar-time-frame {
        --cal-gutter: 3.2rem;
        --cal-col-min: 5.5rem;
        --early-hours: 8;
        --visible-hours: 24;
        --hour-row-height: 2.4rem;
        display: grid;
        grid-template-columns: var(--cal-gutter) repeat(
            var(--cal-cols, 7),
            minmax(var(--cal-col-min), 1fr)
          );
        grid-template-rows: auto minmax(calc(var(--visible-hours) * var(--hour-row-height)), auto);
        min-width: calc(var(--cal-gutter) + var(--cal-cols, 7) * var(--cal-col-min));
      }
      .calendar-time-grid.is-day .calendar-time-frame {
        min-width: 0;
      }
      .calendar-time-header {
        grid-column: 1 / -1;
        grid-row: 1;
        display: grid;
        grid-template-columns: var(--cal-gutter) repeat(
            var(--cal-cols, 7),
            minmax(var(--cal-col-min), 1fr)
          );
        position: relative;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        min-height: calc(2.15rem + var(--allday-lanes, 1) * 1.25rem);
      }
      .calendar-time-corner {
        grid-column: 1;
        grid-row: 1;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 0.25rem 0.15rem;
        border-right: 1px solid var(--line);
        min-height: inherit;
      }
      .calendar-early-toggle {
        appearance: none;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        cursor: pointer;
        font-size: 0.62rem;
        line-height: 1.25;
        letter-spacing: 0.02em;
        padding: 0.28rem 0.2rem;
        width: 100%;
        text-align: center;
      }
      .calendar-early-toggle:hover {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.08);
      }
      .calendar-early-toggle.has-early-events {
        color: var(--accent);
        border-color: rgba(232, 93, 76, 0.45);
      }
      .calendar-day-head {
        grid-row: 1;
        position: relative;
        z-index: 0;
        padding: 0.35rem;
        border-right: 1px solid var(--line);
        min-height: inherit;
      }
      .calendar-day-head.is-last-col {
        border-right: none;
      }
      .calendar-day-head.is-today {
        background: rgba(232, 93, 76, 0.1);
        box-shadow: inset 0 0 0 2px rgba(232, 93, 76, 0.78);
      }
      .calendar-day-head.is-rest-day .calendar-day-num,
      .calendar-day-head.is-holiday .calendar-day-num {
        color: var(--accent);
      }
      .calendar-day-head.is-today .calendar-day-num {
        border-radius: 999px;
        background: var(--accent);
        color: #1a0f0d;
      }
      .calendar-time-header > a.calendar-chip.is-allday {
        position: relative;
        z-index: 1;
        grid-row: 1;
        margin: calc(2.15rem + var(--calendar-lane) * 1.25rem) 0.16rem 0.2rem;
      }
      .calendar-hour-rail {
        --hour-rows: 24;
        grid-column: 1;
        grid-row: 2;
        display: grid;
        grid-template-rows: repeat(var(--hour-rows), var(--hour-row-height));
        border-right: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.68rem;
        background: rgba(255, 255, 255, 0.02);
      }
      .calendar-hour-mark {
        padding: 0.15rem 0.25rem 0 0;
        text-align: right;
        border-bottom: 1px solid rgba(244, 239, 230, 0.06);
      }
      .calendar-timed-columns {
        grid-column: 2 / -1;
        grid-row: 2;
        display: grid;
        grid-template-columns: repeat(var(--cal-cols, 7), minmax(var(--cal-col-min), 1fr));
        min-width: 0;
        min-height: calc(var(--visible-hours) * var(--hour-row-height));
      }
      .calendar-time-col {
        position: relative;
        min-width: 0;
        overflow: hidden;
        border-right: 1px solid var(--line);
        background-image: repeating-linear-gradient(
          to bottom,
          transparent,
          transparent calc(var(--hour-row-height) - 1px),
          rgba(244, 239, 230, 0.06) calc(var(--hour-row-height) - 1px),
          rgba(244, 239, 230, 0.06) var(--hour-row-height)
        );
        min-height: calc(var(--visible-hours) * var(--hour-row-height));
        height: calc(var(--visible-hours) * var(--hour-row-height));
      }
      .calendar-time-col:last-child {
        border-right: none;
      }
      .calendar-time-col.is-today {
        background-color: rgba(232, 93, 76, 0.06);
      }
      .calendar-timed-layer {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: calc(24 * var(--hour-row-height));
      }
      .calendar-time-frame.is-early-collapsed .calendar-timed-layer {
        top: calc(var(--early-hours) * var(--hour-row-height) * -1);
      }
      a.calendar-timed-block {
        position: absolute;
        z-index: 1;
        box-sizing: border-box;
        margin: 0;
        padding: 0.2rem 0.3rem;
        overflow: hidden;
        border-left: 2px solid var(--accent);
        background: rgba(232, 93, 76, 0.2);
        color: var(--ink);
        text-decoration: none;
        font-size: 0.68rem;
        line-height: 1.3;
      }
      a.calendar-timed-block.is-sale {
        border-left-color: #5a8cb4;
        background: rgba(90, 140, 180, 0.24);
      }
      a.calendar-timed-block:hover {
        background: rgba(232, 93, 76, 0.32);
      }
      a.calendar-timed-block.is-sale:hover {
        background: rgba(90, 140, 180, 0.36);
      }
      .calendar-timed-time {
        color: var(--muted);
        font-size: 0.62rem;
        letter-spacing: 0.02em;
      }
      .calendar-timed-title {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }
      a.calendar-agenda-item {
        display: grid;
        gap: 0.2rem;
        padding: 0.7rem 0.8rem;
        border-left: 3px solid var(--accent);
        background: rgba(232, 93, 76, 0.12);
        color: var(--ink);
        text-decoration: none;
        transition: background 140ms ease-out;
      }
      a.calendar-agenda-item.is-sale {
        border-left-color: #5a8cb4;
        background: rgba(90, 140, 180, 0.16);
      }
      a.calendar-agenda-item:hover {
        background: rgba(232, 93, 76, 0.22);
      }
      a.calendar-agenda-item.is-sale:hover {
        background: rgba(90, 140, 180, 0.28);
      }
      .calendar-agenda-meta {
        color: var(--muted);
        font-size: 0.78rem;
      }
      .calendar-agenda-title {
        font-size: 0.95rem;
        line-height: 1.45;
      }
      @media (prefers-reduced-motion: reduce) {
        .calendar-week,
        a.calendar-chip.is-overflow,
        .calendar-more {
          transition: none;
        }
      }
      details.fold {
        border-top: 1px solid var(--line);
        padding-top: 1.4rem;
        margin-top: 1.4rem;
      }
      details.fold > summary {
        list-style: none;
        cursor: pointer;
        font-size: 0.85rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        user-select: none;
      }
      details.fold > summary::-webkit-details-marker {
        display: none;
      }
      details.fold > summary::before {
        content: '▸ ';
        color: var(--accent);
      }
      details.fold[open] > summary::before {
        content: '▾ ';
      }
      details.fold .links {
        margin-top: 1rem;
      }
      a.project-card {
        display: block;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        padding: 1.1rem 1.15rem;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      a.project-card:hover {
        border-color: var(--accent);
        background: rgba(232, 93, 76, 0.1);
      }
      a.project-card .project-name {
        display: block;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.45rem;
      }
      a.project-card .project-desc {
        display: block;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }
      a.project-card .project-url {
        display: block;
        margin-top: 0.7rem;
        color: var(--accent);
        font-size: 0.82rem;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>gbc-news</h1>
      <p class="lead">分类订阅 Girls Band Cry 的最新消息。</p>

      <section>
        <h2>自定义订阅</h2>
        <div class="links">
          <div class="link-row">
            <strong>RSS</strong>
            <div class="link-code">
              <div class="link-field">
                <code id="rss-url"></code>
                <button
                  type="button"
                  class="btn-icon copy-inline"
                  data-copy="rss-url"
                  aria-label="复制链接"
                  title="复制链接"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"
                    />
                  </svg>
                </button>
              </div>
              <div class="link-actions">
                <a
                  class="btn-icon"
                  id="rss-open"
                  href="#"
                  target="_blank"
                  rel="noopener"
                  aria-label="打开 RSS"
                  title="打开 RSS"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M6.18 15.64a2.18 2.18 0 1 1 0 4.36 2.18 2.18 0 0 1 0-4.36Zm-2.36-6.9v2.82c3.9 0 7.08 3.18 7.08 7.08h2.82c0-5.46-4.44-9.9-9.9-9.9Zm0-5.64v2.82c7.02 0 12.72 5.7 12.72 12.72h2.82C19.36 9.3 12.06 2 3.82 2Z"
                    />
                  </svg>
                </a>
              </div>
            </div>
          </div>
          <div class="link-row">
            <strong>iCal / 日历</strong>
            <div class="link-code">
              <div class="link-field">
                <code id="ics-url"></code>
                <button
                  type="button"
                  class="btn-icon copy-inline"
                  data-copy="ics-url"
                  aria-label="复制链接"
                  title="复制链接"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"
                    />
                  </svg>
                </button>
              </div>
              <div class="link-actions">
                <a
                  class="btn-icon primary"
                  id="ics-open"
                  href="#"
                  aria-label="订阅日历"
                  title="订阅日历"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M7 2h2v2h6V2h2v2h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h3V2Zm13 8H4v10h16V10Zm-9 2h2v2h2v2h-2v2h-2v-2H9v-2h2v-2Z"
                    />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>
        <p id="filter-status">当前筛选：加载中…</p>
      </section>

      <section>
        <div class="section-head">
          <h2>选择组合</h2>
          <button type="button" id="toggle-groups">全选</button>
        </div>
        <div class="cats" id="groups"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>选择分类</h2>
          <button type="button" id="toggle-cats">全选</button>
        </div>
        <div class="cats" id="cats"></div>
      </section>

      <section aria-labelledby="calendar-heading">
        <div class="calendar-head">
          <div class="calendar-title-row">
            <h2 id="calendar-heading">日历</h2>
            <div class="calendar-views" role="group" aria-label="日历视图">
              <button type="button" data-calendar-view="month" class="is-active">月</button>
              <button type="button" data-calendar-view="week">周</button>
              <button type="button" data-calendar-view="day">日</button>
            </div>
          </div>
          <div class="calendar-nav">
            <button type="button" id="calendar-prev" aria-label="上个月">上个月</button>
            <span class="calendar-month-label" id="calendar-month-label">—</span>
            <button type="button" id="calendar-next" aria-label="下个月">下个月</button>
            <button type="button" id="calendar-today">本月</button>
          </div>
        </div>
        <p class="calendar-note" id="calendar-note">按当前筛选显示</p>
        <div class="calendar-board" id="calendar-board" data-view="month">
          <div class="calendar-month-bg" id="calendar-month-bg" aria-hidden="true"></div>
          <div class="calendar-weekdays" id="calendar-weekdays" aria-hidden="true">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span
            ><span>六</span><span>日</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
      </section>

      <details class="fold">
        <summary>组合订阅</summary>
        <div class="links" id="group-links"></div>
      </details>

      <details class="fold">
        <summary>分类订阅</summary>
        <div class="links" id="cat-links"></div>
      </details>

      <section>
        <h2>其他作品</h2>
        <a
          class="project-card"
          href="https://oshi-sync.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="project-name">oshi-sync</span>
          <span class="project-desc"
            >日音推担属性图制作器：勾选听过/喜欢/强推，生成可分享的属性图，也能扫码比对同步率。</span
          >
          <span class="project-url">oshi-sync.netlify.app →</span>
        </a>
      </section>
    </main>
    <script type="module" src="/subscribe.js"></script>
  </body>
</html>
