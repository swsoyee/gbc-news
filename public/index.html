<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gbc-news</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg0: #101418;
        --bg1: #1a2229;
        --ink: #f4efe6;
        --muted: #b7c0c8;
        --accent: #e85d4c;
        --line: rgba(244, 239, 230, 0.16);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'IBM Plex Sans JP', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 18%, rgba(232, 93, 76, 0.28), transparent 42%),
          radial-gradient(circle at 88% 0%, rgba(90, 140, 180, 0.22), transparent 36%),
          linear-gradient(160deg, var(--bg0), var(--bg1) 55%, #12171d);
      }
      main {
        width: min(900px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 12vh 0 4rem;
      }
      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(2.8rem, 10vw, 4.8rem);
        line-height: 1.15;
        letter-spacing: -0.03em;
        margin: 0 0 1.25rem;
      }
      .lead {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
        margin: 0 0 2rem;
        max-width: 36rem;
      }
      section {
        border-top: 1px solid var(--line);
        padding-top: 1.4rem;
        margin-top: 1.4rem;
      }
      h2 {
        font-size: 0.85rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin: 0 0 1rem;
        color: var(--muted);
      }
      .cats {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }
      label.cat {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        border: 1px solid var(--line);
        padding: 0.55rem 0.8rem;
        cursor: pointer;
        user-select: none;
        background: rgba(255, 255, 255, 0.03);
      }
      label.cat:has(input:checked) {
        border-color: var(--accent);
        background: rgba(232, 93, 76, 0.14);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin: 0.8rem 0 0;
      }
      button,
      a.btn {
        appearance: none;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--ink);
        font: inherit;
        padding: 0.55rem 0.9rem;
        cursor: pointer;
        text-decoration: none;
      }
      button.primary,
      a.btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #1a0f0d;
        font-weight: 700;
      }
      .links {
        display: grid;
        gap: 0.8rem;
      }
      .link-row {
        display: grid;
        gap: 0.35rem;
      }
      .link-row code {
        display: block;
        overflow-wrap: anywhere;
        padding: 0.75rem 0.85rem;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid var(--line);
        font-size: 0.86rem;
      }
      .link-row.is-dimmed {
        opacity: 0.45;
      }
      .link-row.is-dimmed strong {
        color: var(--muted);
      }
      #filter-status {
        margin: 0.9rem 0 0;
        padding: 0.75rem 0.85rem;
        border: 1px solid var(--accent);
        background: rgba(232, 93, 76, 0.12);
        color: var(--ink);
        font-size: 0.92rem;
        line-height: 1.55;
      }
      .calendar-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
        margin-bottom: 0.9rem;
      }
      .calendar-head h2 {
        margin-bottom: 0;
      }
      .calendar-nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
      }
      .calendar-month-label {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        min-width: 7.5rem;
        text-align: center;
      }
      .calendar-note {
        color: var(--muted);
        font-size: 0.82rem;
        margin: 0 0 0.75rem;
      }
      .calendar-board {
        overflow-x: auto;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.16);
      }
      .calendar-weekdays,
      .calendar-week {
        display: grid;
        grid-template-columns: repeat(7, minmax(6.2rem, 1fr));
        min-width: 43.4rem;
      }
      .calendar-grid {
        min-width: 43.4rem;
      }
      .calendar-week {
        height: 7.2rem;
        overflow: hidden;
        position: relative;
        transition: height 180ms ease-out;
      }
      .calendar-week.is-expanded {
        height: var(--calendar-expanded-height, 7.2rem);
      }
      .calendar-weekdays span {
        padding: 0.45rem 0.35rem;
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-align: center;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }
      .calendar-day-cell {
        min-height: 7.2rem;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 0.35rem;
        background: rgba(255, 255, 255, 0.02);
      }
      .calendar-day-cell:nth-child(7n) {
        border-right: none;
      }
      .calendar-day-cell.is-outside {
        opacity: 0.42;
        background: transparent;
      }
      .calendar-day-cell.is-today {
        background: rgba(232, 93, 76, 0.1);
      }
      .calendar-day-num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.55rem;
        height: 1.55rem;
        margin-bottom: 0.3rem;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
      }
      .calendar-day-cell.is-today .calendar-day-num {
        border-radius: 999px;
        background: var(--accent);
        color: #1a0f0d;
      }
      .calendar-day-events {
        display: grid;
        gap: 0.2rem;
      }
      a.calendar-chip {
        display: block;
        align-self: start;
        grid-row: 1;
        min-width: 0;
        margin: calc(2.15rem + var(--calendar-lane) * 1.25rem) 0.16rem 0;
        z-index: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 0.18rem 0.3rem;
        border-left: 2px solid var(--accent);
        background: rgba(232, 93, 76, 0.16);
        color: var(--ink);
        font-size: 0.68rem;
        line-height: 1.35;
        text-decoration: none;
      }
      a.calendar-chip.is-sale {
        border-left-color: #5a8cb4;
        background: rgba(90, 140, 180, 0.2);
      }
      a.calendar-chip.is-span {
        opacity: 0.88;
      }
      a.calendar-chip.is-overflow {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-0.2rem);
        transition:
          opacity 140ms ease-out,
          transform 180ms ease-out,
          visibility 0s linear 180ms;
        visibility: hidden;
      }
      .calendar-week.is-expanded a.calendar-chip.is-overflow {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
        transition-delay: 40ms;
        visibility: visible;
      }
      a.calendar-chip:hover {
        background: rgba(232, 93, 76, 0.28);
      }
      a.calendar-chip.is-sale:hover {
        background: rgba(90, 140, 180, 0.32);
      }
      .calendar-more {
        align-self: start;
        grid-row: 1;
        margin-top: calc(2.15rem + 3 * 1.25rem);
        z-index: 1;
        color: var(--muted);
        cursor: default;
        font-size: 0.68rem;
        padding: 0.1rem 0.2rem;
        transition:
          opacity 100ms ease-out,
          visibility 0s linear 100ms;
      }
      .calendar-week.is-expanded .calendar-more {
        opacity: 0;
        visibility: hidden;
      }
      @media (prefers-reduced-motion: reduce) {
        .calendar-week,
        a.calendar-chip.is-overflow,
        .calendar-more {
          transition: none;
        }
      }
      details.fold {
        border-top: 1px solid var(--line);
        padding-top: 1.4rem;
        margin-top: 1.4rem;
      }
      details.fold > summary {
        list-style: none;
        cursor: pointer;
        font-size: 0.85rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        user-select: none;
      }
      details.fold > summary::-webkit-details-marker {
        display: none;
      }
      details.fold > summary::before {
        content: '▸ ';
        color: var(--accent);
      }
      details.fold[open] > summary::before {
        content: '▾ ';
      }
      details.fold .links {
        margin-top: 1rem;
      }
      a.project-card {
        display: block;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        padding: 1.1rem 1.15rem;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      a.project-card:hover {
        border-color: var(--accent);
        background: rgba(232, 93, 76, 0.1);
      }
      a.project-card .project-name {
        display: block;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.45rem;
      }
      a.project-card .project-desc {
        display: block;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }
      a.project-card .project-url {
        display: block;
        margin-top: 0.7rem;
        color: var(--accent);
        font-size: 0.82rem;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>gbc-news</h1>
      <p class="lead">分类订阅 Girls Band Cry 的最新消息。</p>

      <section>
        <h2>自定义订阅</h2>
        <div class="links">
          <div class="link-row">
            <strong>RSS</strong>
            <code id="rss-url"></code>
            <div class="actions">
              <button type="button" class="primary" data-copy="rss-url">复制 RSS</button>
              <a class="btn" id="rss-open" href="#" target="_blank" rel="noopener">打开</a>
            </div>
          </div>
          <div class="link-row">
            <strong>iCal / 日历</strong>
            <code id="ics-url"></code>
            <div class="actions">
              <button type="button" class="primary" data-copy="ics-url">复制日历链接</button>
              <a class="btn" id="ics-open" href="#">打开 webcal</a>
            </div>
          </div>
        </div>
        <p id="filter-status">当前筛选：加载中…</p>
      </section>

      <section>
        <h2>选择组合</h2>
        <div class="cats" id="groups"></div>
        <div class="actions">
          <button type="button" id="select-all-groups">全选组合</button>
          <button type="button" id="clear-all-groups">不限组合（全部）</button>
        </div>
      </section>

      <section>
        <h2>选择分类</h2>
        <div class="cats" id="cats"></div>
        <div class="actions">
          <button type="button" id="select-all">全选分类</button>
          <button type="button" id="clear-all">不限分类（全部）</button>
        </div>
        <p class="meta" id="stats">加载中…</p>
      </section>

      <section aria-labelledby="calendar-heading">
        <div class="calendar-head">
          <h2 id="calendar-heading">月历</h2>
          <div class="calendar-nav">
            <button type="button" id="calendar-prev" aria-label="上个月">上个月</button>
            <span class="calendar-month-label" id="calendar-month-label">—</span>
            <button type="button" id="calendar-next" aria-label="下个月">下个月</button>
            <button type="button" id="calendar-today">本月</button>
          </div>
        </div>
        <p class="calendar-note" id="calendar-note">按当前筛选显示</p>
        <div class="calendar-board" id="calendar-board">
          <div class="calendar-weekdays" aria-hidden="true">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span
            ><span>六</span><span>日</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
      </section>

      <details class="fold">
        <summary>各组合日历（ICS）· 快捷单维订阅</summary>
        <div class="links" id="group-links"></div>
      </details>

      <details class="fold">
        <summary>各分类日历（ICS）· 快捷单维订阅</summary>
        <div class="links" id="cat-links"></div>
      </details>

      <section>
        <h2>其他作品</h2>
        <a
          class="project-card"
          href="https://oshi-sync.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="project-name">oshi-sync</span>
          <span class="project-desc"
            >日音推担属性图制作器：勾选听过/喜欢/强推，生成可分享的属性图，也能扫码比对同步率。</span
          >
          <span class="project-url">oshi-sync.netlify.app →</span>
        </a>
      </section>
    </main>
    <script type="module" src="/subscribe.js"></script>
  </body>
</html>
