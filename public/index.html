      .calendar-weekdays,

      .calendar-day-cell:nth-child(7n) {

        opacity: 0.42;
        background: transparent;

      .calendar-day-cell.is-today {

      .calendar-day-cell.is-holiday .calendar-day-num {

        background: var(--accent);
        color: var(--primary-ink);
      }

        display: grid;
        gap: 0.2rem;

      a.calendar-chip {

        transform: translateY(-0.2rem);

          transform 180ms ease-out,
          visibility 0s linear 180ms;
        visibility: hidden;
      }
      .calendar-week.is-expanded a.calendar-chip.is-overflow {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
        transition-delay: 40ms;
        visibility: visible;
      }
      a.calendar-chip:hover {
        background: var(--accent-chip-hover);
      }
      a.calendar-chip.is-sale:hover {
        background: var(--sale-chip-hover);

        --toggle-row-height: 1.35rem;
        --timed-total-height: calc(24 * var(--hour-row-height) + var(--toggle-row-height));
        --timed-visible-height: calc(
          var(--visible-hours) * var(--hour-row-height) + var(--toggle-row-height)
        );
        display: grid;
        grid-template-columns: var(--cal-gutter) repeat(
            var(--cal-cols, 7),
            minmax(var(--cal-col-min), 1fr)
          );
        grid-template-rows: auto minmax(var(--timed-visible-height), auto);
        min-width: calc(var(--cal-gutter) + var(--cal-cols, 7) * var(--cal-col-min));
      }
      .calendar-time-grid.is-day .calendar-time-frame {
        min-width: 0;
      }
      .calendar-time-header {
        grid-column: 1 / -1;
        grid-row: 1;
        display: grid;
        grid-template-columns: var(--cal-gutter) repeat(
            var(--cal-cols, 7),
            minmax(var(--cal-col-min), 1fr)
          );
        position: relative;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
        min-height: calc(2.15rem + var(--allday-lanes, 1) * 1.25rem);
      }
      .calendar-time-corner {
        grid-column: 1;
        grid-row: 1;
        border-right: 1px solid var(--line);
        min-height: inherit;
      }
      .calendar-day-head {
        grid-row: 1;
        position: relative;
        z-index: 0;
        padding: 0.35rem;
        border-right: 1px solid var(--line);
        min-height: inherit;
      }
      .calendar-day-head.is-last-col {
        border-right: none;
      }
      .calendar-day-head.is-today {
        background: var(--accent-softer);
        box-shadow: inset 0 0 0 2px var(--today-outline);
      }
      .calendar-day-head.is-rest-day .calendar-day-num,
      .calendar-day-head.is-holiday .calendar-day-num {
        color: var(--accent);
      }
      .calendar-day-head.is-today .calendar-day-num {
        border-radius: 999px;
        background: var(--accent);
        color: var(--primary-ink);
      }
      .calendar-time-header > a.calendar-chip.is-allday {
        position: relative;
        z-index: 1;
        grid-row: 1;
        margin: calc(2.15rem + var(--calendar-lane) * 1.25rem) 0.16rem 0.2rem;
      }
      .calendar-timed-viewport {
        grid-column: 1 / -1;
        grid-row: 2;
        overflow: hidden;
        height: var(--timed-visible-height);
        transition: height 320ms ease;
      }
      .calendar-timed-shift {
        display: grid;
        grid-template-columns: var(--cal-gutter) minmax(0, 1fr);
        height: var(--timed-total-height);
        transform: translateY(calc(var(--early-offset, 0) * var(--hour-row-height) * -1));
        transition: transform 320ms ease;
      }
      .calendar-hour-rail {
        display: grid;
        grid-template-rows:
          repeat(var(--early-hours), var(--hour-row-height))
          var(--toggle-row-height)
          repeat(calc(24 - var(--early-hours)), var(--hour-row-height));
        height: var(--timed-total-height);
        border-right: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.68rem;
        background: var(--surface);
      }
      .calendar-hour-mark {
        position: relative;
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        padding: 0.15rem 0.25rem 0 0;
        border-bottom: 1px solid var(--grid-line);
      }
      .calendar-hour-label {
        pointer-events: none;
      }
      .calendar-early-toggle-row {
        display: flex;
        align-items: stretch;
        min-height: var(--toggle-row-height);
        border-bottom: 1px solid var(--grid-line-strong);
        background: var(--surface);
      }
      .calendar-early-toggle {
        appearance: none;
        box-sizing: border-box;
        display: inline-flex;
        flex: 1 1 auto;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: var(--toggle-row-height);
        margin: 0;
        padding: 0;
        border: 0;
        border-right: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1;
        transition:
          color 160ms ease,
          background 160ms ease;
      }
      .calendar-early-toggle:hover {
        color: var(--ink);
        background: var(--surface-hover);
      }
      .calendar-timed-columns {
        display: grid;
        grid-template-columns: repeat(var(--cal-cols, 7), minmax(var(--cal-col-min), 1fr));
        min-width: 0;
        height: var(--timed-total-height);
      }
      .calendar-time-col {
        position: relative;
        min-width: 0;
        overflow: hidden;
        border-right: 1px solid var(--line);
        height: var(--timed-total-height);
        background-image:
          repeating-linear-gradient(
            to bottom,
            transparent,
            transparent calc(var(--hour-row-height) - 1px),
            var(--grid-line) calc(var(--hour-row-height) - 1px),
            var(--grid-line) var(--hour-row-height)
          ),
          repeating-linear-gradient(
            to bottom,
            transparent,
            transparent calc(var(--hour-row-height) - 1px),
            var(--grid-line) calc(var(--hour-row-height) - 1px),
            var(--grid-line) var(--hour-row-height)
          );
        background-size:
          100% calc(var(--early-hours) * var(--hour-row-height)),
          100% calc((24 - var(--early-hours)) * var(--hour-row-height));
        background-position:
          0 0,
          0 calc(var(--early-hours) * var(--hour-row-height) + var(--toggle-row-height));
        background-repeat: no-repeat;
      }
      .calendar-time-col::before {
        content: '';
        position: absolute;
        top: calc(var(--early-hours) * var(--hour-row-height));
        left: 0;
        right: 0;
        height: var(--toggle-row-height);
        border-bottom: 1px solid var(--grid-line-strong);
        background: var(--surface);
        pointer-events: none;
      }
      .calendar-time-col:last-child {
        border-right: none;
      }
      .calendar-time-col.is-today {
        background-color: var(--accent-softer);
      }
      .calendar-timed-layer {
        position: absolute;
        inset: 0;
      }
      a.calendar-timed-block {
        position: absolute;
        z-index: 1;
        box-sizing: border-box;
        margin: 0;
        padding: 0.2rem 0.3rem;
        overflow: hidden;
        border-left: 2px solid var(--accent);
        background: var(--accent-chip);
        color: var(--ink);
        text-decoration: none;
        font-size: 0.68rem;
        line-height: 1.3;
      }
      a.calendar-timed-block.is-sale {
        border-left-color: var(--sale);
        background: var(--sale-chip);
      }
      a.calendar-timed-block:hover {
        background: var(--accent-chip-hover);
      }
      a.calendar-timed-block.is-sale:hover {
        background: var(--sale-chip-hover);
      }
      .calendar-timed-time {
        color: var(--muted);
        font-size: 0.62rem;
        letter-spacing: 0.02em;
      }
      .calendar-timed-title {
        overflow: hidden;
        line-clamp: 3;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }
      @media (prefers-reduced-motion: reduce) {
        .calendar-week,
        a.calendar-chip.is-overflow,
        .calendar-more,
        .calendar-timed-viewport,
        .calendar-timed-shift,
        .calendar-early-toggle {
          transition: none;
        }
      }
      details.fold {
        border-top: 1px solid var(--line);
        padding-top: 1.4rem;
        margin-top: 1.4rem;
      }
      details.fold > summary {
        list-style: none;
        cursor: pointer;
        font-size: 0.85rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        user-select: none;
      }
      details.fold > summary::-webkit-details-marker {
        display: none;
      }
      details.fold > summary::before {
        content: '▸ ';
        color: var(--accent);
      }
      details.fold[open] > summary::before {
        content: '▾ ';
      }
      details.fold .links {
        margin-top: 1rem;
      }
      a.project-card {
        display: block;
        border: 1px solid var(--line);
        background: var(--surface);
        padding: 1.1rem 1.15rem;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      a.project-card:hover {
        border-color: var(--accent);
        background: var(--accent-softer);
      }
      a.project-card .project-name {
        display: block;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.45rem;
      }
      a.project-card .project-desc {
        display: block;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }
      a.project-card .project-url {
        display: block;
        margin-top: 0.7rem;
        color: var(--accent);
        font-size: 0.82rem;
        letter-spacing: 0.02em;
      }
    </style>
    <script src="./theme-boot.js"></script>
  </head>
  <body>
    <button
      type="button"
      class="theme-toggle btn-icon"
      id="theme-toggle"
      aria-label="开灯"
      title="开灯"
    >
      <svg
        class="theme-icon theme-icon-on"
        viewBox="0 0 24 24"
        aria-hidden="true"
        focusable="false"
      >
        <path
          fill="currentColor"
          d="M12 2a7 7 0 0 0-4 12.74V18a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-3.26A7 7 0 0 0 12 2Zm-2 14v1h4v-1h-4Zm2 6a3 3 0 0 0 2.83-2h-5.66A3 3 0 0 0 12 22Z"
        />
      </svg>
      <svg
        class="theme-icon theme-icon-off"
        viewBox="0 0 24 24"
        aria-hidden="true"
        focusable="false"
      >
        <path
          fill="currentColor"
          d="M12 2a7 7 0 0 0-4 12.74V18a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-3.26A7 7 0 0 0 12 2Zm-2 14v1h4v-1h-4Zm2 6a3 3 0 0 0 2.83-2h-5.66A3 3 0 0 0 12 22Z"
          opacity="0.45"
        />
        <path
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          d="M4.5 4.5l15 15"
        />
      </svg>
    </button>
    <main>
      <h1>gbc-news</h1>
      <p class="lead">分类订阅 Girls Band Cry 的最新消息。</p>

      <section>
        <h2>自定义订阅</h2>
        <div class="links">
          <div class="link-row">
            <strong>RSS</strong>
            <div class="link-code">
              <div class="link-field">
                <code id="rss-url"></code>
                <button
                  type="button"
                  class="btn-icon copy-inline"
                  data-copy="rss-url"
                  aria-label="复制链接"
                  title="复制链接"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"
                    />
                  </svg>
                </button>
              </div>
              <div class="link-actions">
                <a
                  class="btn-icon"
                  id="rss-open"
                  href="#"
                  target="_blank"
                  rel="noopener"
                  aria-label="打开 RSS"
                  title="打开 RSS"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M6.18 15.64a2.18 2.18 0 1 1 0 4.36 2.18 2.18 0 0 1 0-4.36Zm-2.36-6.9v2.82c3.9 0 7.08 3.18 7.08 7.08h2.82c0-5.46-4.44-9.9-9.9-9.9Zm0-5.64v2.82c7.02 0 12.72 5.7 12.72 12.72h2.82C19.36 9.3 12.06 2 3.82 2Z"
                    />
                  </svg>
                </a>
              </div>
            </div>
          </div>
          <div class="link-row">
            <strong>iCal / 日历</strong>
            <div class="link-code">
              <div class="link-field">
                <code id="ics-url"></code>
                <button
                  type="button"
                  class="btn-icon copy-inline"
                  data-copy="ics-url"
                  aria-label="复制链接"
                  title="复制链接"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"
                    />
                  </svg>
                </button>
              </div>
              <div class="link-actions">
                <a
                  class="btn-icon primary"
                  id="ics-open"
                  href="#"
                  aria-label="订阅日历"
                  title="订阅日历"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M7 2h2v2h6V2h2v2h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h3V2Zm13 8H4v10h16V10Zm-9 2h2v2h2v2h-2v2h-2v-2H9v-2h2v-2Z"
                    />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>
        <p id="filter-status">当前筛选：加载中…</p>
      </section>

      <section>
        <div class="section-head">
          <h2>选择组合</h2>
          <button type="button" id="toggle-groups">全选</button>
        </div>
        <div class="cats" id="groups"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>选择分类</h2>
          <button type="button" id="toggle-cats">全选</button>
        </div>
        <div class="cats" id="cats"></div>
      </section>

      <section aria-labelledby="calendar-heading">
        <div class="calendar-head">
          <div class="calendar-title-row">
            <h2 id="calendar-heading">日历</h2>
            <div class="calendar-views" role="group" aria-label="日历视图">
              <button type="button" data-calendar-view="month" class="is-active">月</button>
              <button type="button" data-calendar-view="week">周</button>
              <button type="button" data-calendar-view="day">日</button>
            </div>
          </div>
          <div class="calendar-nav">
            <button type="button" id="calendar-prev" aria-label="上个月">上个月</button>
            <span class="calendar-month-label" id="calendar-month-label">—</span>
            <button type="button" id="calendar-next" aria-label="下个月">下个月</button>
            <button type="button" id="calendar-today">本月</button>
          </div>
        </div>
        <p class="calendar-note" id="calendar-note">按当前筛选显示</p>
        <div class="calendar-board" id="calendar-board" data-view="month">
          <div class="calendar-month-bg" id="calendar-month-bg" aria-hidden="true"></div>
          <div class="calendar-weekdays" id="calendar-weekdays" aria-hidden="true">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span
            ><span>六</span><span>日</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
      </section>

      <details class="fold">
        <summary>组合订阅</summary>
        <div class="links" id="group-links"></div>
      </details>

      <details class="fold">
        <summary>分类订阅</summary>
        <div class="links" id="cat-links"></div>
      </details>

      <section>
        <h2>其他作品</h2>
        <a
          class="project-card"
          href="https://oshi-sync.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="project-name">oshi-sync</span>
          <span class="project-desc"
            >日音推担属性图制作器：勾选听过/喜欢/强推，生成可分享的属性图，也能扫码比对同步率。</span
          >
          <span class="project-url">oshi-sync.netlify.app →</span>
        </a>
      </section>
    </main>
    <script type="module" src="./subscribe.js"></script>
  </body>
</html>
