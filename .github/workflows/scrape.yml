# 定时增量抓取四源（gbc-news / firstriff / collabo-cafe / gamepedia），重建 RSS·iCal 并推送（触发 Netlify 部署）
name: Scrape

on:
  schedule:
    # 日本时间 12:00 / 22:00（UTC+9）
    - cron: '0 3 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-main
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape sources (incremental)
        id: scrape
        continue-on-error: true
        env:
          SCRAPE_MODE: incremental
        run: npm run scrape

      # scrape-all 会跑完所有源：部分失败 exit 1，全失败 exit 2。
      # 只要未被取消，就用现有成功快照重建 feeds（build-feeds 会拒绝空总集）。
      - name: Build feeds
        if: always() && steps.scrape.conclusion != 'cancelled'
        env:
          SITE_URL: https://gbc-news.netlify.app
        run: npm run build:feeds

      - name: Commit and push updates
        if: always() && steps.scrape.conclusion != 'cancelled'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public/data public/feeds
          if git diff --staged --quiet; then
            echo "No feed changes"
            exit 0
          fi
          git commit -m "chore: 增量更新抓取快照与订阅源"
          git push

      - name: Propagate scrape failure
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "Scrape reported failure (partial or full). Job marked failed after commit attempt."
          exit 1
